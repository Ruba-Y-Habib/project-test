<html>
    <head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <title>log in</title>
    </head>

    <style>
        body{
            background: #948f8f;
        }
    </style>
    <body>
        


<script>
    username ="Admin"
    password="123"
    function login(){
        un=document.getElementById("username").value;
        pw=document.getElementById("password").value;

        if(username == un && pw == password){
            document.getElementById("error message").style.display="none";
           document.getElementById("username").style.border="solid 2px green";
           document.getElementById("password").style.border="solid 2px green";
        }
        else{
           document.getElementById("error message").style.display="block";
           document.getElementById("username").style.border="solid 2px red";
           document.getElementById("password").style.border="solid 2px red";

        }
    }
</script>

<div style="text-align: center; margin-top: 150px; padding:15px; ">
    <h3 style="color: aliceblue;">welcome back !</h3>
    <div class="row" style="width: 300px; margin:auto;padding-right:10px;  border:solid 1px #cccccc ">
        <div class="col-12" id="error message" style="color: #ea3d2e; display:none;">
            pleas chech the information
        </div>
        <div class="col-12">
        <input type="text" id="username" class="form-control" style="margin: 6px; margin-top:20px" placeholder="username">
        </div>
        <div class="col-12">
        <input type="password" id="password" class="form-control" style="margin: 6px;" placeholder="password">
        <input type="button" onclick="login()"  class="btn btn-success" style="margin: 10px;" value="login">
        </div>


        <div class="col-12" style="color: #cccccc;margin-bottom:10px;">
             log in with
        </div>
        <div class="col-6" >
            <div style="color: #58b7ee; padding:5px; border:1px solid #f1f1f1;">
            <img src="images/f.png" width="30">facebook
            </div>
        </div>
        <div class="col-6">
            <div  style="color: #ea3d2e; padding:5px; border:1px solid #f1f1f1;">
            <img src="images/google.png" width="30" >google
            </div>
        </div>
    </div>
</div>
    </body>
</html>
